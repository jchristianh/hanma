name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Syntax & Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner:
          - ansible-dev-centos
          - ansible-dev-fedora
          - ansible-dev-debian

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install markdown pygments pymdown-extensions pytest

      - name: Check syntax (py_compile)
        run: python3 -m py_compile ssg.py && echo "Syntax OK"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
